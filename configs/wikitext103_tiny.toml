dataset_path = "data/wikitext-103-raw/wiki.train.raw"
tokenizer_save_path = "checkpoints/wikitext103_tiny/tokenizer.json"
vocab_size = 32000
validation_split = 0.01
shuffle = true
resume = true
device = "cuda:0"
dtype = "bf16"

[model]
vocab_size = 32000
hidden_dim = 384
ffn_dim = 1024
n_layers = 8
n_heads = 6
n_kv_heads = 2
max_seq_len = 512
rope_theta = 10000.0
norm_eps = 0.00001
tie_embeddings = true

[train]
lr = 0.001
batch_size = 2
grad_accum_steps = 16
max_epochs = 5
max_steps = 10000
warmup_steps = 500
min_lr_ratio = 0.1
weight_decay = 0.1
beta1 = 0.9
beta2 = 0.95
epsilon = 0.00000001
clip_grad_norm = 1.0
save_every_n_steps = 1000
log_every_n_steps = 10
eval_steps = 500
seed = 42
checkpoint_dir = "checkpoints/wikitext103_tiny"
