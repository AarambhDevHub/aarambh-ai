dataset_path = "data/wikitext-103-raw/wiki.train.raw"
tokenizer_save_path = "checkpoints/wikitext103_cuda_smoke/tokenizer.json"
vocab_size = 8000
validation_split = 0.01
shuffle = true
resume = false
device = "cuda:0"
dtype = "bf16"

[model]
vocab_size = 8000
hidden_dim = 384
ffn_dim = 1024
n_layers = 2
n_heads = 6
n_kv_heads = 2
max_seq_len = 128
rope_theta = 10000.0
norm_eps = 0.00001
tie_embeddings = true

[train]
lr = 0.001
batch_size = 1
grad_accum_steps = 1
max_epochs = 1
max_steps = 2
warmup_steps = 0
min_lr_ratio = 1.0
weight_decay = 0.0
beta1 = 0.9
beta2 = 0.95
epsilon = 0.00000001
clip_grad_norm = 1.0
save_every_n_steps = 0
log_every_n_steps = 1
eval_steps = 0
seed = 42
checkpoint_dir = "checkpoints/wikitext103_cuda_smoke"
